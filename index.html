<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="FobForge — RFID badge manager for BTicino Sfera .prj files">
  <meta name="author" content="MRGN79">

  <title>FobForge</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>🔑</text>
    </svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Loading screen — visible before JS takes over -->
  <div id="loading-screen" style="
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 9999;
    font-family: 'JetBrains Mono', monospace;
  ">
    <span style="font-size: 40px;">🔑</span>
    <span style="color: #00d4a0; font-size: 14px;">FobForge</span>
    <span id="loading-status" style="color: #666; font-size: 12px;">
      Loading...
    </span>
  </div>

  <!-- Debug panel — fixed at bottom, always visible -->
  <div id="debug" style="
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #111;
    color: #00ff88;
    font-size: 11px;
    padding: 8px 12px;
    z-index: 99999;
    max-height: 30vh;
    overflow-y: auto;
    font-family: monospace;
    border-top: 1px solid #333;
    display: none;
  "></div>

  <!-- App mounts here -->
  <div id="app"></div>

  <!-- Early error capture -->
  <script>
    var _debug = document.getElementById('debug');
    var _status = document.getElementById('loading-status');
    var _sqljsError = false;

    function _err(msg) {
      _debug.style.display = 'block';
      _debug.innerHTML += msg + '<br>';
      _debug.scrollTop = _debug.scrollHeight;
      if (_status) _status.textContent = msg;
      console.error('[FobForge]', msg);
    }

    window.onerror = function(msg, src, line) {
      _err('ERROR: ' + msg + ' (line ' + line + ')');
    };

    window.onunhandledrejection = function(e) {
      _err('PROMISE ERROR: ' + (e.reason && e.reason.message || e.reason));
    };

    // Safety fallback — hide loading screen after 8 seconds no matter what
    setTimeout(function() {
      var s = document.getElementById('loading-screen');
      if (s) s.parentNode.removeChild(s);
    }, 8000);
  </script>

  <!-- sql.js (pinned version — WebAssembly SQLite) -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"
    integrity="sha384-8D3Rsfo535FqoC1pHCCQMrNf75UgzyoG/HQm9zOzITRrz3QKzecc2E7JXKGCXoWu"
    crossorigin="anonymous"
    onload="console.log('[FobForge] sql.js loaded')"
    onerror="_sqljsError = true; _err('ERROR: failed to load sql.js')">
  </script>

  <!-- Application entry point -->
  <script type="module">
    import { bootstrap } from './js/app.js';

    function waitForSqlJs() {
      return new Promise(function(resolve, reject) {
        function check() {
          if (typeof initSqlJs === 'function') {
            resolve();
          } else if (_sqljsError) {
            reject(new Error('sql.js failed to load'));
          } else {
            setTimeout(check, 50);
          }
        }
        check();
      });
    }

    waitForSqlJs()
      .then(function() {
        return bootstrap();
      })
      .then(function() {
        var s = document.getElementById('loading-screen');
        if (s) s.parentNode.removeChild(s);
      })
      .catch(function(e) {
        _err('FATAL: ' + (e.message || e));
        var s = document.getElementById('loading-screen');
        if (s) s.parentNode.removeChild(s);
      });
  </script>

</body>
</html>

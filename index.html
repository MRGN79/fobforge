<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="FobForge — RFID badge manager for BTicino Sfera .prj files">
  <meta name="author" content="MRGN79">

  <title>FobForge</title>

  <!-- Favicon (inline SVG as data URI — no external file needed) -->
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <text y='.9em' font-size='90'>🔑</text>
    </svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">

  <!-- sql.js (pinned version — WebAssembly SQLite) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>

  <!-- App mounts here — see ui.js _renderShell() -->
  <div id="app"></div>

  <!-- Wait for sql.js before bootstrapping -->
  <script>
    function waitForSqlJs(callback) {
      if (typeof initSqlJs === 'function') {
        callback();
      } else {
        setTimeout(function() { waitForSqlJs(callback); }, 50);
      }
    }
  </script>

  <!-- Application entry point (ES modules) -->
  <script type="module">
    import { bootstrap } from './js/app.js';
    waitForSqlJs(function() {
      bootstrap();
    });
  </script>

</body>
</html>
